(function(){
  var P = atob('ZGVsaXZlcm9v');
  function tryUnlock(){
    if(document.getElementById('pw').value === P){ launch(); }

      i.classList.remove('shake'); void i.offsetWidth; i.classList.add('shake');
      e.textContent='Incorrect — try again'; i.value='';
    }
  }
  document.getElementById('gbtn').addEventListener('click',tryUnlock);
  document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')tryUnlock();});

  function launch(){
    document.getElementById('gate-screen').classList.add('gone');
    var app = document.getElementById('app');

  function buildJS(){return `(function(){
